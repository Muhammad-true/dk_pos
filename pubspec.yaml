name: dk_pos
description: "POS Doner Kebab: Bloc, репозитории, тема, ru/en/tj."
publish_to: 'none'

version: 1.0.12+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  auto_route: ^9.3.0
  dio: ^5.7.0
  equatable: ^2.0.7
  flutter_bloc: ^9.0.0
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  file_picker: ^8.1.4
  dk_digitial_menu:
    path: ../dk_digitial_menu
  image_picker: ^1.2.1
  package_info_plus: ^9.0.1
  qr_flutter: ^4.1.0
  desktop_multi_window: ^0.2.1
  screen_retriever: ^0.2.0
  window_manager: ^0.5.1
  # Видеофон ТВ2: официальный video_player не поддерживает Windows — fvp подключает декодер.
  fvp: ^0.35.2
  web_socket_channel: ^3.0.3
  flutter_tts: ^4.2.5
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  auto_route_generator: ^9.3.0
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/.env
    - assets/img/logo.png
    - assets/img/icon_logo.PNG
    - assets/img/bank/dc.png
    - assets/img/bank/photo_5337234839905702752_y.jpg

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  image_path: assets/img/logo.png
  adaptive_icon_foreground: assets/img/logo.png
  adaptive_icon_background: "#FFFFFF"
